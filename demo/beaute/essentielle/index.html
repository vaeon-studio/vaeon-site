<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<title>Maison Lumière · Institut de beauté à Paris 2ᵉ</title>
<meta name="description" content="Institut de beauté à Paris 2ᵉ. Cinq spécialités : ongles, sourcils, cils, esthétique, massage. Cabines indépendantes, équipe diplômée." />
<meta name="theme-color" content="#F5EFE5" />

<link rel="preload" as="image" data-cfg="hero-photo-preload" href="assets/images/hero.jpg" fetchpriority="high" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="css/style.css" />

<!-- Config + moteur d'injection (synchrone dans <head> : variables CSS posées avant peinture) -->
<script src="js/config.js"></script>
<script src="js/apply-config.js"></script>

<!-- VÆON · Plausible Analytics (defer = non-bloquant LCP, queue intégrée) -->
<script defer data-domain="vaeon.fr" src="https://plausible.io/js/script.js"></script>
<script>window.plausible = window.plausible || function(){(plausible.q=plausible.q||[]).push(arguments)}</script>
</head>
<body data-page="home">

<a class="skip" href="#main">Aller au contenu</a>

<!-- ========== HEADER ========== -->
<header class="site-header" id="siteHeader" data-scrolled="false">
  <div class="header-inner">
    <a href="/" class="brand" data-cfg="brand-link" aria-label="Accueil">
      <span class="brand-name" data-cfg="brand-name">MAISON LUMIÈRE</span>
    </a>
    <nav class="nav-primary" aria-label="Navigation principale">
      <ul>
        <li><a href="#histoire">Histoire</a></li>
        <li><a href="#prestations">Prestations</a></li>
        <li><a href="#galerie">Galerie</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
    <a href="#" class="btn btn-accent btn-reserve" data-cfg-href="reservation">Réserver</a>
    <button class="burger" id="burger" aria-label="Ouvrir le menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="mobile-menu" id="mobileMenu" hidden>
    <ul>
      <li><a href="#histoire">Histoire</a></li>
      <li><a href="#prestations">Prestations</a></li>
      <li><a href="#galerie">Galerie</a></li>
      <li><a href="#contact">Contact</a></li>
      <li><a href="#" class="mobile-cta" data-cfg-href="reservation">Réserver →</a></li>
    </ul>
  </div>
</header>

<main id="main">

  <!-- ========== HERO (photo statique en background) ========== -->
  <section class="hero" aria-label="Présentation" style="background-image:url('assets/images/hero.jpg')">
    <div class="hero-content">
      <p class="eyebrow light hero-eyebrow" data-cfg="hero-eyebrow"></p>
      <h1 class="hero-title">
        <span class="hero-line" data-cfg="hero-line1"></span>
        <span class="hero-line" data-cfg="hero-line2"></span>
      </h1>
      <p class="hero-promo" data-cfg="hero-promo"></p>
    </div>
    <a href="#histoire" class="scroll-indicator" aria-label="Faire défiler"><span></span></a>
  </section>

  <!-- ========== HISTOIRE (méthode) ========== -->
  <section class="histoire" id="histoire">
    <div class="container">
      <div class="histoire-grid">
        <figure class="histoire-img reveal">
          <img data-cfg="histoire-image" src="" alt="" width="800" height="1000" loading="lazy" decoding="async" />
        </figure>
        <div class="histoire-text reveal">
          <p class="eyebrow" data-cfg="histoire-eyebrow"></p>
          <h2 class="display" data-cfg="histoire-titre"></h2>
          <p class="histoire-lede" data-cfg="histoire-intro"></p>

          <div data-cfg-list="histoire-piliers">
            <!-- Généré dynamiquement -->
          </div>

          <div class="histoire-stats" data-cfg-list="histoire-stats">
            <!-- Généré dynamiquement -->
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ========== PRESTATIONS (liste textuelle simple) ========== -->
  <section class="prestations" id="prestations">
    <div class="container">
      <header class="section-head center reveal">
        <h2 class="display" data-cfg="prestations-titre"></h2>
      </header>

      <div class="prestations-list" data-cfg-list="prestations">
        <!-- Généré dynamiquement par apply-config.js -->
      </div>
    </div>
  </section>

  <!-- ========== GALERIE (4 photos statiques — bandeau pleine largeur) ========== -->
  <section class="galerie" id="galerie" data-cfg-section="galerie">
    <div class="container">
      <header class="section-head center reveal">
        <p class="eyebrow centered" data-cfg="galerie-eyebrow"></p>
        <h2 class="display" data-cfg="galerie-titre"></h2>
      </header>
    </div>
    <div class="galerie-grid" data-cfg-list="galerie-photos">
      <!-- Tiles générées dynamiquement -->
    </div>
  </section>

  <!-- ========== AVIS ========== -->
  <section class="avis" id="avis" data-cfg-section="avis">
    <div class="container">
      <header class="section-head center reveal">
        <p class="eyebrow centered" data-cfg="avis-eyebrow"></p>
        <h2 class="display" data-cfg="avis-titre"></h2>
      </header>
      <div class="avis-grid" data-cfg-list="avis">
        <!-- Généré dynamiquement -->
      </div>
    </div>
  </section>

  <!-- ========== CONTACT ========== -->
  <section class="contact" id="contact">
    <div class="container">
      <div class="contact-grid">
        <div class="contact-info reveal">
          <p class="eyebrow"><span class="rule"></span>Nous trouver</p>
          <h2 class="display" data-cfg="contact-titre"></h2>
          <address data-cfg="contact-adresse"></address>
          <dl class="hours" data-cfg-list="horaires">
            <!-- Généré dynamiquement -->
          </dl>
          <div class="contact-actions">
            <a class="btn btn-ink" href="" data-cfg-href="sms">Envoyer un SMS</a>
            <a class="btn btn-ghost" href="" data-cfg-href="maps-directions">Itinéraire →</a>
          </div>
        </div>
        <div class="contact-map reveal">
          <iframe data-cfg="maps-iframe"
            src=""
            title=""
            width="100%" height="100%"
            loading="lazy" referrerpolicy="no-referrer-when-downgrade"
            allowfullscreen></iframe>
        </div>
      </div>
    </div>
  </section>

</main>

<!-- ========== FOOTER ========== -->
<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-logo"><span class="brand-name brand-name-footer" data-cfg="brand-name">MAISON LUMIÈRE</span></div>
    <p class="footer-tagline" data-cfg="footer-tagline"></p>
    <div class="footer-cta">
      <a href="" class="btn btn-accent" data-cfg-href="reservation">Réserver</a>
    </div>
    <ul class="socials" aria-label="Réseaux sociaux">
      <li><a href="" data-cfg-social="instagram" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r=".8" fill="currentColor"/></svg></a></li>
      <li><a href="" data-cfg-social="facebook" target="_blank" rel="noopener noreferrer" aria-label="Facebook"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M14 8h2V5h-2a3 3 0 0 0-3 3v2H9v3h2v6h3v-6h2l1-3h-3V8z"/></svg></a></li>
      <li><a href="" data-cfg-social="tiktok" target="_blank" rel="noopener noreferrer" aria-label="TikTok"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M14 4v9.5a3.5 3.5 0 1 1-3.5-3.5"/><path d="M14 4c.5 2.5 2.5 4 5 4"/></svg></a></li>
    </ul>
    <p class="legal" data-cfg="footer-legal"></p>
  </div>
</footer>

<script src="js/site.js"></script>
</body>
</html>

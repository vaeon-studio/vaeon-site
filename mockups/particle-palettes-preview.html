<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Preview — Mix mono + pink</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#0e0e10;color:#f3f1ea;font-family:'JetBrains Mono',monospace}
  .stage{padding:32px 40px;display:flex;flex-direction:column;gap:18px}
  .row{padding:14px 18px;background:#15151a;border:1px solid rgba(243,241,234,.08);border-radius:14px}
  .row .head{display:flex;align-items:center;gap:14px;margin-bottom:10px;font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:#b9b6ad}
  .row .head .num{display:inline-flex;width:24px;height:24px;align-items:center;justify-content:center;border:1px solid rgba(243,241,234,.18);border-radius:50%;font-size:10px;color:#f3f1ea;font-weight:600}
  .row .head .swatches{display:inline-flex;gap:4px;margin-left:auto;flex-wrap:wrap}
  .row .head .sw{width:14px;height:14px;border-radius:3px}
  canvas{display:block;width:100%;height:160px;border-radius:8px;background:#0a0a0c}
  h1{font-size:13px;text-transform:uppercase;letter-spacing:.2em;color:#7a7a82;margin-bottom:18px;padding:0 40px;padding-top:32px}
</style>
</head>
<body>

<h1>Preview · 3 propositions de mix mono blanc/gris + mono pink</h1>

<div class="stage" id="stage"></div>

<script>
const palettes = [
  { num: 'A', label: 'Mix alterné · gris ↔ pink',     colors: ['ffffff','ffd1de','f3f1ea','ff8aaa','b9b6ad','ff5e8a','7a7a82','c43d6a'] },
  { num: 'B', label: 'Dégradé clair → foncé',         colors: ['ffffff','f3f1ea','ffd1de','ff8aaa','ff5e8a','c43d6a','7a7a82','3a3a40'] },
  { num: 'C', label: 'Mono dominant + pink accent',   colors: ['ffffff','f3f1ea','b9b6ad','ff8aaa','ff5e8a','7a7a82'] },
];

function render(canvas, colors, text='ATELIER NOVA') {
  const ctx = canvas.getContext('2d');
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  canvas.width = w;
  canvas.height = h;
  const tH = Math.floor(w / text.length);
  const fontH = Math.min(tH, h * 0.85);
  ctx.font = `900 ${fontH}px Verdana, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const tW = Math.round(ctx.measureText(text).width);
  const tx = 0.5 * (w - tW);
  const ty = 0.5 * (h - fontH);
  const off = document.createElement('canvas');
  off.width = w; off.height = h;
  const oc = off.getContext('2d');
  oc.font = `900 ${fontH}px Verdana, sans-serif`;
  oc.textAlign = 'center';
  oc.textBaseline = 'middle';
  const grad = oc.createLinearGradient(tx, ty, tx + tW, ty + fontH);
  const N = Math.max(colors.length - 1, 1);
  colors.forEach((c, i) => grad.addColorStop(i / N, '#' + c));
  oc.fillStyle = grad;
  oc.fillText(text, w/2, h/2);
  const x0 = Math.max(0, Math.floor(tx));
  const y0 = Math.max(0, Math.floor(ty));
  const ww = Math.min(w - x0, Math.ceil(tW));
  const hh = Math.min(h - y0, Math.ceil(fontH));
  if (ww <= 0 || hh <= 0) return;
  const data = oc.getImageData(x0, y0, ww, hh).data;
  const density = 4;
  ctx.clearRect(0, 0, w, h);
  for (let i = 0; i < data.length; i += 4) {
    const idx = i / 4;
    const px = idx % ww;
    const py = Math.floor(idx / ww);
    if (data[i+3] && !(px % density) && !(py % density)) {
      const r = Math.max(0, data[i]   + Math.floor((Math.random()*26)-13));
      const g = Math.max(0, data[i+1] + Math.floor((Math.random()*26)-13));
      const b = Math.max(0, data[i+2] + Math.floor((Math.random()*26)-13));
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.beginPath();
      ctx.arc(x0 + px, y0 + py, 1 + Math.random() * 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

const stage = document.getElementById('stage');
palettes.forEach(p => {
  const row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = `
    <div class="head">
      <span class="num">${p.num}</span>
      <span>${p.label}</span>
      <span class="swatches">${p.colors.map(c => `<span class="sw" style="background:#${c}"></span>`).join('')}</span>
    </div>
    <canvas></canvas>
  `;
  stage.appendChild(row);
});
// Force render after layout — handles case where load already fired
function renderAll() {
  document.querySelectorAll('canvas').forEach((c, i) => render(c, palettes[i].colors));
}
if (document.readyState === 'complete') {
  requestAnimationFrame(renderAll);
} else {
  window.addEventListener('load', () => requestAnimationFrame(renderAll));
}
</script>
</body>
</html>

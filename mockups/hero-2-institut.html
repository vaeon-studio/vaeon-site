<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Maison Lumière — Institut de beauté</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --beige:#f4ecdc;
    --rose:#e7c5b9;
    --rose-deep:#c89a8c;
    --ink:#3a2a26;
    --gold:#b9956a;
  }
  html,body{height:100%;background:var(--beige);color:var(--ink);font-family:'Manrope',sans-serif;overflow:hidden}
  .hero{position:relative;width:100%;height:100vh;overflow:hidden;display:grid;grid-template-columns:1fr 1fr}

  /* LEFT — text panel */
  .panel{position:relative;background:var(--beige);padding:80px 64px 48px;display:flex;flex-direction:column;justify-content:space-between;z-index:5}
  .panel::before{content:'';position:absolute;top:0;right:0;width:200px;height:200px;background:radial-gradient(circle at 100% 0%,rgba(231,197,185,.5),transparent 60%);pointer-events:none}

  /* Brand */
  .brand{font-family:'Bungee',cursive;font-size:38px;color:var(--ink);line-height:1;display:flex;flex-direction:column;align-items:flex-start}
  .brand small{font-family:'Manrope',sans-serif;font-size:9px;letter-spacing:.4em;font-weight:600;color:var(--rose-deep);margin-top:4px}

  /* Center content */
  .content{margin:auto 0;max-width:520px}
  .meta{font-size:10px;text-transform:uppercase;letter-spacing:.32em;color:var(--rose-deep);margin-bottom:28px;display:flex;align-items:center;gap:14px;opacity:0;animation:slideUp 1s .2s forwards}
  .meta::before{content:'';width:30px;height:1px;background:var(--rose-deep)}
  h1{font-family:'Bungee',cursive;font-weight:400;font-size:clamp(56px,7vw,108px);line-height:.95;letter-spacing:-.015em;color:var(--ink);opacity:0;animation:slideUp 1.1s .35s forwards}
  h1 em{font-style:italic;color:var(--rose-deep)}
  .promo{margin-top:36px;display:flex;align-items:center;gap:14px;opacity:0;animation:slideUp 1s .65s forwards}
  .promo .line{width:50px;height:1px;background:var(--rose-deep);opacity:.5}
  .promo span{font-family:'Bungee',cursive;font-style:italic;font-size:18px;color:var(--ink);opacity:.85}
  .actions{margin-top:48px;display:flex;align-items:center;gap:24px;opacity:0;animation:slideUp 1s .85s forwards}
  .btn-primary{padding:18px 32px;background:var(--ink);color:var(--beige);font-size:11px;text-transform:uppercase;letter-spacing:.25em;text-decoration:none;font-weight:600;transition:all .35s;display:inline-flex;align-items:center;gap:14px}
  .btn-primary:hover{background:var(--rose-deep);transform:translateY(-2px)}
  .btn-link{font-size:11px;text-transform:uppercase;letter-spacing:.25em;color:var(--ink);text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:14px;transition:gap .3s}
  .btn-link::after{content:'→';transition:transform .3s}
  .btn-link:hover::after{transform:translateX(6px)}

  /* Bottom row of panel */
  .panel-foot{display:flex;justify-content:space-between;align-items:flex-end;font-size:10px;text-transform:uppercase;letter-spacing:.22em;color:var(--ink);opacity:.55;line-height:1.8}
  .panel-foot .right{text-align:right}

  /* RIGHT — image */
  .visual{position:relative;overflow:hidden;background:var(--rose)}
  .visual::before{content:'';position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1556228720-195a672e8a03?w=2400&q=85&auto=format&fit=crop') center/cover no-repeat;animation:zoom 22s ease-in-out infinite alternate}
  @keyframes zoom{from{transform:scale(1)}to{transform:scale(1.1)}}
  .visual::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(231,197,185,.15) 0%,transparent 40%,rgba(58,42,38,.25) 100%)}

  /* Floating tag */
  .float-tag{position:absolute;bottom:48px;right:48px;z-index:5;background:rgba(244,236,220,.92);backdrop-filter:blur(20px);padding:18px 22px;border-radius:6px;display:flex;align-items:center;gap:14px;box-shadow:0 20px 60px -20px rgba(58,42,38,.35);max-width:280px}
  .float-tag .ico{width:42px;height:42px;border-radius:999px;background:var(--rose);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Bungee',cursive;font-style:italic;font-size:22px;color:var(--ink)}
  .float-tag .txt{font-size:11px;color:var(--ink);line-height:1.5}
  .float-tag .txt strong{display:block;font-size:13px;margin-bottom:2px;font-weight:700}

  /* Top right floating */
  .float-top{position:absolute;top:48px;right:48px;z-index:6;display:flex;align-items:center;gap:8px;background:rgba(244,236,220,.85);backdrop-filter:blur(12px);padding:10px 16px;border-radius:999px;font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--ink);font-weight:600}
  .float-top::before{content:'';width:6px;height:6px;border-radius:999px;background:#5fa37c;animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.4}}

  @keyframes slideUp{to{opacity:1;transform:translateY(0)}}
  .meta,h1,.promo,.actions{transform:translateY(20px)}

  @media (max-width:900px){.hero{grid-template-columns:1fr}.visual{display:none}}
</style>
</head>
<body>
<div class="hero">

  <div class="panel">
    <div class="brand">Maison Lumière<small>BEAUTÉ</small></div>

    <div class="content">
      <div class="meta">Institut de beauté · Bordeaux</div>
      <h1>L'art<br>de <em>se révéler</em>.</h1>
      <div class="promo">
        <span class="line"></span>
        <span>—20 % offerts sur votre première visite</span>
      </div>
      <div class="actions">
        <a href="#" class="btn-primary">Réserver <span>→</span></a>
        <a href="#" class="btn-link">Découvrir l'institut</a>
      </div>
    </div>

    <div class="panel-foot">
      <div>22 cours du Médoc<br>33000 Bordeaux</div>
      <div class="right">Lundi — Samedi<br>9h30 — 19h</div>
    </div>
  </div>

  <div class="visual">
    <div class="float-top">Disponible aujourd'hui</div>
    <div class="float-tag">
      <div class="ico">★</div>
      <div class="txt"><strong>4,9 / 5</strong>247 avis Google</div>
    </div>
  </div>

</div>
</body>
</html>

<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Preview — Particle text interactive</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#0e0e10;color:#f3f1ea;height:100%;overflow:hidden;font-family:'JetBrains Mono',ui-monospace,monospace;cursor:none}
  canvas{position:fixed;inset:0;display:block;cursor:none}
  .note{position:fixed;top:20px;left:20px;z-index:10;padding:10px 16px;background:rgba(28,28,34,.85);border:1px solid rgba(243,241,234,.1);border-radius:999px;font-size:11px;color:#b9b6ad;text-transform:uppercase;letter-spacing:.14em;backdrop-filter:blur(10px);pointer-events:none}
  .hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;font-size:11px;color:#7a7a82;text-transform:uppercase;letter-spacing:.14em;pointer-events:none}
</style>
</head>
<body>

<div class="note">Preview · particle text interactif (passe la souris sur le texte)</div>
<canvas id="cv"></canvas>
<div class="hint">— passe la souris pour disperser les particules —</div>

<script>
(function(){
  const canvas = document.getElementById('cv');
  const ctx = canvas.getContext('2d');
  const text = 'ATELIER NOVA';
  // Site DA colors
  const colors = ['ff5e8a','ffb547','c6f964','5fc9ff','a47fff','5fffd4'];
  const animationForce = 80;
  const particleDensity = 4;

  let particles = [];
  let pointer = { x: undefined, y: undefined };
  let hasPointer = false;
  let interactionRadius = 100;
  let textBox = { str: text, x:0, y:0, w:0, h:0 };
  let rafId = null;

  const rand = (max=1, min=0, dec=0) => +(min + Math.random() * (max - min)).toFixed(dec);

  class Particle {
    constructor(x, y, rgb=[rand(128), rand(128), rand(128)]) {
      this.ox = x; this.oy = y;
      this.cx = x; this.cy = y;
      this.or = rand(5, 1);
      this.cr = this.or;
      this.pv = 0; this.ov = 0;
      this.f = rand(animationForce + 15, animationForce - 15);
      this.rgb = rgb.map(c => Math.max(0, c + rand(13, -13)));
    }
    draw() {
      ctx.fillStyle = `rgb(${this.rgb.join(',')})`;
      ctx.beginPath();
      ctx.arc(this.cx, this.cy, this.cr, 0, 2 * Math.PI);
      ctx.fill();
    }
    move(radius, has) {
      if (has && pointer.x !== undefined && pointer.y !== undefined) {
        const dx = this.cx - pointer.x;
        const dy = this.cy - pointer.y;
        const dist = Math.hypot(dx, dy);
        if (dist < radius && dist > 0) {
          const force = Math.min(this.f, (radius - dist) / dist * 2);
          this.cx += (dx / dist) * force;
          this.cy += (dy / dist) * force;
        }
      }
      const odx = this.ox - this.cx;
      const ody = this.oy - this.cy;
      const od = Math.hypot(odx, ody);
      if (od > 1) {
        const restore = Math.min(od * 0.1, 3);
        this.cx += (odx / od) * restore;
        this.cy += (ody / od) * restore;
      }
      this.draw();
    }
  }

  function dottify() {
    const data = ctx.getImageData(textBox.x, textBox.y, textBox.w, textBox.h).data;
    const pixels = [];
    for (let i = 0; i < data.length; i += 4) {
      const idx = i / 4;
      const x = idx % textBox.w;
      const y = Math.floor(idx / textBox.w);
      if (data[i+3] && !(x % particleDensity) && !(y % particleDensity)) {
        pixels.push({ x, y, rgb: [data[i], data[i+1], data[i+2]] });
      }
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pixels.forEach((p, i) => {
      particles[i] = new Particle(textBox.x + p.x, textBox.y + p.y, p.rgb);
      particles[i].draw();
    });
    particles.length = pixels.length;
  }

  function write() {
    textBox.str = text;
    textBox.h = Math.floor(canvas.width / textBox.str.length);
    interactionRadius = Math.max(50, textBox.h * 1.5);
    ctx.font = `900 ${textBox.h}px Verdana, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    textBox.w = Math.round(ctx.measureText(textBox.str).width);
    textBox.x = 0.5 * (canvas.width - textBox.w);
    textBox.y = 0.5 * (canvas.height - textBox.h);
    const grad = ctx.createLinearGradient(textBox.x, textBox.y, textBox.x + textBox.w, textBox.y + textBox.h);
    const N = colors.length - 1;
    colors.forEach((c, i) => grad.addColorStop(i / N, '#' + c));
    ctx.fillStyle = grad;
    ctx.fillText(textBox.str, 0.5 * canvas.width, 0.5 * canvas.height);
    dottify();
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => p.move(interactionRadius, hasPointer));
    rafId = requestAnimationFrame(animate);
  }

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    write();
  }

  canvas.addEventListener('pointermove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width;
    const sy = canvas.height / rect.height;
    pointer.x = (e.clientX - rect.left) * sx;
    pointer.y = (e.clientY - rect.top) * sy;
    hasPointer = true;
    if (!rafId) animate();
  });
  canvas.addEventListener('pointerleave', () => {
    hasPointer = false;
    pointer.x = undefined;
    pointer.y = undefined;
    if (!rafId) animate();
  });
  canvas.addEventListener('pointerenter', () => { hasPointer = true; });

  window.addEventListener('resize', resize);
  resize();
  // Run a few frames so particles settle visibly even before pointer move
  let initialFrames = 0;
  function initialAnimate() {
    if (initialFrames++ > 60) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => p.draw());
    requestAnimationFrame(initialAnimate);
  }
  initialAnimate();
})();
</script>
</body>
</html>
